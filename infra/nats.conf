# NATS server config for Farmer.
# Bound on all interfaces — reachable from host loopback AND from Hyper-V VMs
# on the 192.168.144.0/24 NAT subnet via 192.168.144.1.

server_name: farmer-hub
listen: 0.0.0.0:4222
http: 0.0.0.0:8222            # monitoring / /varz / /jsz

jetstream {
  store_dir: "C:/work/iso/planning-runtime/nats"
  max_mem:   256MB
  max_file:  4GB
}

# Simple logging to stdout — redirected to logs/nats.log by the launcher script.
debug:   false
trace:   false
logtime: true

# No auth for the prototype — private subnet, short-lived.
# For production, swap in `authorization { users = [...] }` or JWT.
