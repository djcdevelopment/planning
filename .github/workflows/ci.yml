name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Farmer.sln

      - name: Build
        run: dotnet build Farmer.sln --no-restore -c Release

      - name: Test
        run: dotnet test Farmer.sln --no-build -c Release --verbosity normal
