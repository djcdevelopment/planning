name: secrets-scan

# Server-side second-line for the pre-commit secret scanner at
# infra/check-staged-secrets.ps1. If a contributor commits with --no-verify,
# or pushes from a clone where the hook isn't installed, this workflow catches
# the leak before the PR can merge.
#
# Scans the PR's full diff against the base branch. On push-to-main, scans the
# push range (catches direct pushes / merge commits).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  secrets-scan:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute diff
        id: diff
        shell: pwsh
        run: |
          if ($env:GITHUB_EVENT_NAME -eq 'pull_request') {
            $base = "origin/$env:GITHUB_BASE_REF"
            git fetch origin $env:GITHUB_BASE_REF --depth=50
            git diff $base...HEAD -U0 | Out-File -FilePath diff.patch -Encoding utf8
          } else {
            $before = "${{ github.event.before }}"
            $after  = "${{ github.sha }}"
            if (-not $before -or $before -match '^0+$') {
              # New branch push (shouldn't happen for main, but fall back to last commit)
              git diff "$after^..$after" -U0 | Out-File -FilePath diff.patch -Encoding utf8
            } else {
              git diff "$before..$after" -U0 | Out-File -FilePath diff.patch -Encoding utf8
            }
          }
          Write-Host "diff.patch size: $((Get-Item diff.patch).Length) bytes"

      - name: Scan diff for secrets
        shell: pwsh
        run: .\infra\check-staged-secrets.ps1 -Diff diff.patch

      - name: Self-test scanner patterns
        shell: pwsh
        run: .\infra\check-staged-secrets.ps1 -Test
