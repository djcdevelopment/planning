<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="Segoe UI, Arial, sans-serif" font-size="12">
  <title>Farmer Tech Stack and Scaling Path</title>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <linearGradient id="hostGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="vmGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#fed7aa"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="700" fill="#f8fafc" rx="8"/>

  <text x="500" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Farmer Tech Stack</text>
  <text x="500" y="48" text-anchor="middle" font-size="11" fill="#64748b">Current architecture (Phase 6) and scaling path</text>

  <!-- ===== OBSERVABILITY LAYER ===== -->
  <rect x="40" y="65" width="920" height="70" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2" rx="8"/>
  <text x="500" y="88" text-anchor="middle" font-size="14" font-weight="bold" fill="#3730a3">Observability Layer</text>
  <text x="140" y="108" text-anchor="middle" font-size="10" fill="#3730a3">Aspire Dashboard</text>
  <text x="140" y="120" text-anchor="middle" font-size="9" fill="#4f46e5">:18888 HTTP</text>
  <text x="340" y="108" text-anchor="middle" font-size="10" fill="#3730a3">OTLP gRPC Receiver</text>
  <text x="340" y="120" text-anchor="middle" font-size="9" fill="#4f46e5">:18889</text>
  <text x="540" y="108" text-anchor="middle" font-size="10" fill="#3730a3">Traces: Farmer + MAF</text>
  <text x="540" y="120" text-anchor="middle" font-size="9" fill="#4f46e5">ActivitySource("Farmer") + Experimental.Microsoft.Agents.AI</text>
  <text x="780" y="108" text-anchor="middle" font-size="10" fill="#3730a3">Metrics: farmer.* + gen_ai.*</text>
  <text x="780" y="120" text-anchor="middle" font-size="9" fill="#4f46e5">Meter("Farmer") + MAF meters</text>

  <!-- ===== HOST LAYER ===== -->
  <rect x="40" y="150" width="920" height="220" fill="url(#hostGrad)" stroke="#2563eb" stroke-width="2" rx="8"/>
  <text x="500" y="172" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">Host Layer — Windows 10 / .NET 8</text>
  <text x="500" y="186" text-anchor="middle" font-size="9" fill="#3b82f6">http://localhost:5100 (portmap: farmer/api)</text>

  <!-- Project boxes -->
  <rect x="60" y="195" width="200" height="70" fill="#fff" stroke="#2563eb" rx="5"/>
  <text x="160" y="215" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">Farmer.Host</text>
  <text x="160" y="230" text-anchor="middle" font-size="9" fill="#3b82f6">ASP.NET Core Web</text>
  <text x="160" y="243" text-anchor="middle" font-size="9" fill="#3b82f6">InboxWatcher, Program.cs</text>
  <text x="160" y="256" text-anchor="middle" font-size="9" fill="#3b82f6">OTel config, DI composition</text>

  <rect x="280" y="195" width="200" height="70" fill="#fff" stroke="#2563eb" rx="5"/>
  <text x="380" y="215" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">Farmer.Core</text>
  <text x="380" y="230" text-anchor="middle" font-size="9" fill="#3b82f6">Pure engine, zero AI deps</text>
  <text x="380" y="243" text-anchor="middle" font-size="9" fill="#3b82f6">RunWorkflow, 7 Stages</text>
  <text x="380" y="256" text-anchor="middle" font-size="9" fill="#3b82f6">Middleware, Models, Contracts</text>

  <rect x="500" y="195" width="200" height="70" fill="#f5f3ff" stroke="#7c3aed" rx="5"/>
  <text x="600" y="215" text-anchor="middle" font-size="12" font-weight="bold" fill="#5b21b6">Farmer.Agents</text>
  <text x="600" y="230" text-anchor="middle" font-size="9" fill="#7c3aed">MAF 1.1.0 (stable)</text>
  <text x="600" y="243" text-anchor="middle" font-size="9" fill="#7c3aed">OpenAI gpt-4o-mini</text>
  <text x="600" y="256" text-anchor="middle" font-size="9" fill="#7c3aed">MafRetrospectiveAgent</text>

  <rect x="720" y="195" width="220" height="70" fill="#fff" stroke="#2563eb" rx="5"/>
  <text x="830" y="215" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">Farmer.Tools</text>
  <text x="830" y="230" text-anchor="middle" font-size="9" fill="#3b82f6">SshService (Renci.SshNet)</text>
  <text x="830" y="243" text-anchor="middle" font-size="9" fill="#3b82f6">MappedDriveReader (SSHFS)</text>
  <text x="830" y="256" text-anchor="middle" font-size="9" fill="#3b82f6">VmManager, FileRunStore</text>

  <!-- Key packages -->
  <text x="60" y="285" font-size="9" font-weight="bold" fill="#475569">Key Packages:</text>
  <text x="60" y="298" font-size="8" fill="#64748b">OpenTelemetry.* 1.10-1.11 | Microsoft.Agents.AI.OpenAI 1.1.0 | Microsoft.Extensions.AI 10.4.1</text>
  <text x="60" y="310" font-size="8" fill="#64748b">Renci.SshNet 2024.2.0 | xUnit 2.9.0 | .NET 8 SDK</text>

  <!-- Runtime dir -->
  <rect x="60" y="325" width="350" height="30" fill="#d1fae5" stroke="#059669" rx="4"/>
  <text x="235" y="344" text-anchor="middle" font-size="10" fill="#065f46">D:\work\planning-runtime\ — externalized state (runs/, inbox/, data/)</text>

  <!-- ===== TRANSPORT LAYER ===== -->
  <rect x="40" y="385" width="920" height="50" fill="#fef3c7" stroke="#d97706" stroke-width="1.5" rx="6"/>
  <text x="200" y="414" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">Transport</text>
  <text x="450" y="414" text-anchor="middle" font-size="10" fill="#92400e">SSH/SCP outbound (Renci.SshNet) | SSHFS mapped drive inbound (O:\) | OTLP gRPC (:18889) | OpenAI HTTPS</text>

  <!-- ===== VM LAYER ===== -->
  <rect x="40" y="450" width="920" height="110" fill="url(#vmGrad)" stroke="#ea580c" stroke-width="2" rx="8"/>
  <text x="500" y="472" text-anchor="middle" font-size="14" font-weight="bold" fill="#9a3412">VM Layer — Hyper-V Ubuntu (claudefarm1/2/3)</text>

  <rect x="60" y="483" width="180" height="28" fill="#fff" stroke="#ea580c" rx="4"/>
  <text x="150" y="501" text-anchor="middle" font-size="10" fill="#9a3412">Claude Code CLI 2.1.x</text>

  <rect x="260" y="483" width="150" height="28" fill="#fff" stroke="#ea580c" rx="4"/>
  <text x="335" y="501" text-anchor="middle" font-size="10" fill="#9a3412">worker.sh (bash)</text>

  <rect x="430" y="483" width="120" height="28" fill="#fff" stroke="#ea580c" rx="4"/>
  <text x="490" y="501" text-anchor="middle" font-size="10" fill="#9a3412">Node.js 22</text>

  <rect x="570" y="483" width="100" height="28" fill="#fff" stroke="#ea580c" rx="4"/>
  <text x="620" y="501" text-anchor="middle" font-size="10" fill="#9a3412">git</text>

  <rect x="690" y="483" width="120" height="28" fill="#fff" stroke="#ea580c" rx="4"/>
  <text x="750" y="501" text-anchor="middle" font-size="10" fill="#9a3412">jq 1.7</text>

  <rect x="830" y="483" width="110" height="28" fill="#fff" stroke="#ea580c" rx="4"/>
  <text x="885" y="501" text-anchor="middle" font-size="10" fill="#9a3412">Ubuntu 22.04</text>

  <text x="60" y="540" font-size="9" fill="#9a3412">Full dangerous mode: no tool allowlist, max-turns 500, any package/binary/framework. VM is the sandbox.</text>

  <!-- ===== SCALING PATH ===== -->
  <rect x="40" y="575" width="920" height="100" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" rx="8"/>
  <text x="500" y="598" text-anchor="middle" font-size="14" font-weight="bold" fill="#15803d">Scaling Path (Phase 7+)</text>

  <rect x="60" y="610" width="200" height="28" fill="#dcfce7" stroke="#16a34a" rx="4"/>
  <text x="160" y="628" text-anchor="middle" font-size="10" fill="#15803d">VmManager pool → N VMs</text>

  <rect x="280" y="610" width="220" height="28" fill="#dcfce7" stroke="#16a34a" rx="4"/>
  <text x="390" y="628" text-anchor="middle" font-size="10" fill="#15803d">InboxWatcher → worker pool</text>

  <rect x="520" y="610" width="210" height="28" fill="#dcfce7" stroke="#16a34a" rx="4"/>
  <text x="625" y="628" text-anchor="middle" font-size="10" fill="#15803d">Pipeline per-run isolation (factory)</text>

  <rect x="750" y="610" width="190" height="28" fill="#dcfce7" stroke="#16a34a" rx="4"/>
  <text x="845" y="628" text-anchor="middle" font-size="10" fill="#15803d">Auto-apply directives</text>

  <text x="60" y="660" font-size="9" fill="#15803d">WorkflowPipelineFactory already builds fresh CostTrackingMiddleware per run. Adding concurrency = add a Channel&lt;T&gt; between InboxWatcher and a pool of workers.</text>

  <!-- Footer -->
  <text x="500" y="690" text-anchor="middle" font-size="9" fill="#94a3b8">Farmer Phase 6 — .NET 8 + MAF 1.1.0 + Claude CLI + OpenTelemetry</text>
</svg>
